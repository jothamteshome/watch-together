name: Deploy watch-together backend to EC2 via AWS SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: us-east-1

    - name: Update SSM Parameters
      run: |
        aws ssm put-parameter --name "/watch-together/backend/port" --value "${{ secrets.BACKEND_PORT }}" --type "String" --overwrite
        aws ssm put-parameter --name "/watch-together/backend/youtube/api/key" --value "${{ secrets.YOUTUBE_API_KEY }}" --type "SecureString" --overwrite

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: backend
        push: true
        tags: ghcr.io/jothamteshome/watch-together-backend:latest

    - name: Deploy on EC2
      run: |
        command_id=$(aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "git config --global --add safe.directory /opt/infrastructure",
            "git -C /opt/infrastructure fetch origin main",
            "git -C /opt/infrastructure reset --hard origin/main",
            "bash /opt/infrastructure/cloud/perpetual-app-host/scripts/setup-instance.sh",
            ". /etc/profile.d/init-env.sh",
            "cd /opt/infrastructure/cloud/perpetual-app-host",
            "docker compose pull watch-together",
            "docker compose up -d --no-deps watch-together"
          ]}' \
          --comment "Deploy watch-together backend" \
          --query "Command.CommandId" \
          --output text)

        aws ssm wait command-executed \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }}

        aws ssm get-command-invocation \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --query "StandardOutputContent" \
          --output text